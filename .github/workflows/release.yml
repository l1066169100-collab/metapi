name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build server
        run: npm run build:web && npm run build:server

  build-server-image:
    name: Build Server Image (linux-amd64)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build release image tarball
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          image_tag="${IMAGE_NAME}:sha-${short_sha}-amd64"
          docker buildx build \
            --platform linux/amd64 \
            --file docker/Dockerfile \
            --tag "$image_tag" \
            --output type=docker,dest=metapi-linux-amd64.tar \
            .
          gzip -f metapi-linux-amd64.tar

      - name: Upload server image artifact
        uses: actions/upload-artifact@v7
        with:
          name: metapi-server-image-linux-amd64-${{ github.sha }}
          path: metapi-linux-amd64.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-server-image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Determine release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA::12}"
            echo "tag_name=main-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "release_name=Main build ${short_sha}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download server image artifact
        uses: actions/download-artifact@v8
        with:
          name: metapi-server-image-linux-amd64-${{ github.sha }}
          path: release-assets

      - name: Show release files
        run: ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          name: ${{ steps.release-meta.outputs.release_name }}
          prerelease: ${{ steps.release-meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/metapi-linux-amd64.tar.gz

  publish-docker:
    name: Publish Docker Image (linux-amd64)
    needs: build-server-image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tag list
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo 'tags<<EOF'
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
              echo "${IMAGE_NAME}:latest"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'tags<<EOF'
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:sha-${short_sha}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push linux-amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64
